apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    service: db
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      service: db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: db
    spec:
      containers:
        - args:
            - -p
            - "6000"
          envFrom:
            - secretRef:
                name: env
          image: postgres:17
          name: db
          ports:
            - containerPort: 6000
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pg-data
      restartPolicy: Always
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: pg-data
