apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    service: elastic
  name: elastic
spec:
  replicas: 1
  selector:
    matchLabels:
      service: elastic
  template:
    metadata:
      labels:
        service: elastic
    spec:
      containers:
        - env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
          image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1-amd64
          name: elastic
          ports:
            - containerPort: 9300
              protocol: TCP
      restartPolicy: Always
