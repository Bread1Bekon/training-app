services:
  db:
    image: postgres:17
    command: -p 6000
    env_file: .env
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "6000:6000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-training_db}

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1-amd64
    ports:
      - "9300:9300"

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - elastic

volumes:
  pg-data: