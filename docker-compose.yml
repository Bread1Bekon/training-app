services:
  db:
    image: postgres:latest
    env_file: .env
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "6000:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-training_db}

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pg-data: